<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f2328" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png?v=20260514" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260514" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=20260514" />
    <link rel="mask-icon" href="/game-radar-detect-black-mask.svg?v=20260514" color="#1f2328" />
    <link rel="manifest" href="/manifest.webmanifest?v=20260514" />
    <title>Game Radar</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Game Radar</p>
          <h1 id="pageTitle">榜单监控</h1>
          <p id="pageSubtitle" class="page-subtitle">实时 App Store 与 Steam 指标</p>
        </div>
        <div class="actions">
          <button id="refreshButton" type="button">刷新</button>
          <span id="status" class="status">准备加载</span>
        </div>
      </header>
      <nav id="pageNav" class="page-nav" aria-label="监控页面"></nav>
      <section id="summary" class="summary-grid" aria-label="核心指标"></section>
      <section id="monitorList" class="game-list" aria-label="监控列表"></section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
